<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Interactive Handouts</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1C355E;
            --accent-green: #2E8B57;
            --bg-color: #F8F9FA;
            --text-color: #333333;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: var(--primary-blue);
            margin-bottom: 1rem;
        }
        p {
            color: #666;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        button {
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }
        button:hover {
            background-color: #247548;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(46, 139, 87, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Teacher Dashboard</h1>
        <p>Welcome to your interactive teaching platform. Generate a new session below. This will create a unique, randomized URL for your student.</p>
        <button id="launch-btn">🚀 Create New Handout Session</button>
    </div>

    <script>
        document.getElementById('launch-btn').addEventListener('click', () => {
            // Generate a random 8 character slug
            const randomSlug = Math.random().toString(36).substring(2, 10);
            
            // Redirect to the new lesson viewer URL with teacher mode enabled
            window.location.href = `/h/${randomSlug}?role=teacher`;
        });
    </script>
</body>
</html>
